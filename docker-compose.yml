services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file:
      - server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: http://localhost:8080
    volumes:
      - cybernest_uploads:/app/server/uploads
    expose:
      - "5000"

  web:
    build:
      context: .
      target: frontend
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: ""
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  cybernest_uploads:
