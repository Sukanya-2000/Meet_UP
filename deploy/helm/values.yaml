image: { repository: cybernest/api, tag: latest, pullPolicy: IfNotPresent }
api: { replicas: 3, port: 5000 }
worker: { replicas: 2 }
autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 10, cpu: 70 }
config: { NODE_ENV: production, CACHE_PROVIDER: redis, JOB_PROVIDER: bullmq, MEDIA_PROVIDER: s3 }
secrets: { existingSecret: cybernest-secrets }
