apiVersion: apps/v1
kind: Deployment
metadata: { name: cybernest-api }
spec:
  replicas: 3
  selector: { matchLabels: { app: cybernest-api } }
  template:
    metadata: { labels: { app: cybernest-api } }
    spec:
      containers:
        - name: api
          image: cybernest/api:latest
          ports: [{ containerPort: 5000 }]
          envFrom: [{ secretRef: { name: cybernest-secrets } }, { configMapRef: { name: cybernest-config } }]
          readinessProbe: { httpGet: { path: /api/health, port: 5000 }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /api/health, port: 5000 }, initialDelaySeconds: 20, periodSeconds: 20 }
          resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: "1", memory: 1Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: cybernest-api }
spec: { selector: { app: cybernest-api }, ports: [{ port: 80, targetPort: 5000 }] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: cybernest-api }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: cybernest-api }
  minReplicas: 2
  maxReplicas: 10
  metrics: [{ type: Resource, resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } } }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: cybernest-worker }
spec:
  replicas: 2
  selector: { matchLabels: { app: cybernest-worker } }
  template:
    metadata: { labels: { app: cybernest-worker } }
    spec:
      containers:
        - name: worker
          image: cybernest/api:latest
          command: ["npm", "run", "worker"]
          envFrom: [{ secretRef: { name: cybernest-secrets } }, { configMapRef: { name: cybernest-config } }]
